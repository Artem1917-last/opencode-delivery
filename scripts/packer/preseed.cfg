# =============================================================================
# Debian Installer Preseed Configuration
# =============================================================================
# Purpose: Fully automated Debian 12 installation for OpenCode Delivery
# Delivery: Floppy disk via Packer QEMU builder
# Network: DHCP (automatic) - works during Packer build
# Note: Client configures static IP manually at FirstVDS deployment
# =============================================================================

# =============================================================================
# Early commands (runs before partitioner)
# =============================================================================
d-i early/commands string \
    echo "OpenCode Delivery - Automated Installation"

# =============================================================================
# Locale and keyboard
# =============================================================================
d-i debian-installer/locale select en_US.UTF-8
d-i debian-installer/language select en
d-i debian-installer/country select US
d-i console-setup/console-setup/layoutcode select us
d-i keyboard-configuration/xkb-keymap select us

# =============================================================================
# Network configuration - DHCP (works in QEMU Packer build)
# =============================================================================
# Note: For FirstVDS deployment, client configures static IP manually
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string opencode
d-i netcfg/get_domain string local

# =============================================================================
# Mirror settings
# =============================================================================
d-i mirror/country select US
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# =============================================================================
# Clock and timezone
# =============================================================================
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# =============================================================================
# Users and passwords
# =============================================================================
# Root account - disabled (use sudo)
d-i passwd/root-login boolean false

# Create devuser account
d-i passwd/user-fullname string OpenCode Delivery User
d-i passwd/username string devuser
# NOTE: This password is for Packer build only!
# Client must change password after first login
d-i passwd/user-password password packer
d-i passwd/user-password-again password packer
d-i passwd/user-default-groups string sudo docker
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# =============================================================================
# Partitioning
# =============================================================================
# Use entire disk with LVM
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# Use atomic recipe (single partition, simple)
d-i partman-auto/choose_recipe select atomic

# Auto-confirm partitioning
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# =============================================================================
# Package selection
# =============================================================================
tasksel tasksel/first multiselect standard, ssh-server

# Individual packages - base system only
# Docker and other packages installed via Packer shell provisioner
d-i pkgsel/include string \
    openssh-server \
    sudo \
    vim \
    curl \
    wget \
    git \
    ca-certificates

d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/username select no

# =============================================================================
# Boot loader
# =============================================================================
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# =============================================================================
# Post-install commands (late_command)
# =============================================================================
# These commands run after installation but before first reboot
d-i preseed/late_command string \
    # Enable sudo for devuser without password (for Packer provisioning)
    echo 'devuser ALL=(ALL) NOPASSWD: ALL' > /target/etc/sudoers.d/devuser; \
    chmod 440 /target/etc/sudoers.d/devuser; \
    # Configure SSH for password authentication
    sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /target/etc/ssh/sshd_config; \
    sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /target/etc/ssh/sshd_config; \
    # Set hostname
    echo 'opencode' > /target/etc/hostname; \
    # Configure hosts
    sed -i 's/localhost localhost localhost/localhost opencode localhost/' /target/etc/hosts; \
    # Add localhost to hosts
    echo '127.0.0.1 opencode' >> /target/etc/hosts; \
    # Enable SSH service
    chroot /target systemctl enable sshd || true; \
    # Create network configuration placeholder (client will configure static IP)
    mkdir -p /target/etc/network/interfaces.d; \
    echo '# Client configures static IP at FirstVDS deployment' > /target/etc/network/interfaces.d/static-ip; \
    echo '# See /usr/local/bin/init.sh for network setup instructions' >> /target/etc/network/interfaces.d/static-ip; \
    # Create first-boot marker
    mkdir -p /target/var/lib/opencode-delivery; \
    echo 'INSTALL_COMPLETE=$(date)' > /target/var/lib/opencode-delivery/first-boot-marker

# =============================================================================
# Finish installation
# =============================================================================
d-i finish-install/reboot_in_progress note

# =============================================================================
# Avoid last screen
# =============================================================================
d-i cdrom-detect/eject boolean false
